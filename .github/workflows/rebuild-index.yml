name: Rebuild index from existing data

# Run this manually if the web app shows fewer terms than data/*.json actually
# contains on disk - it happens if a scrape/backfill run was interrupted
# before it could update index.json. This does NOT scrape anything; it just
# regenerates index.json by reading whatever term files already exist.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild index.json
        working-directory: scraper
        run: python rebuild_index.py

      - name: Commit data
        run: |
          git config user.name "rebuild-index-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/index.json
          git diff --cached --quiet && echo "No changes." || git commit -m "Rebuild index.json from existing data files"
          git push
